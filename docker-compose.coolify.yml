# nopCommerce deployment for Coolify (PostgreSQL + persistent volumes)
#
# Deploy in Coolify as a "Docker Compose" resource pointing at this file.
# Required setup in the Coolify UI:
#   1. Set the env var POSTGRES_PASSWORD to a strong value.
#   2. Assign a domain to the nopcommerce_web service (Coolify's proxy routes to the exposed port 80).
#
# ── INSTALL: two options ────────────────────────────────────────────────────
#
# Option A — MANUAL wizard (default; leave NOP_AUTO_INSTALL unset):
#   On first run open your domain -> /install. Choose:
#     - Database type: PostgreSQL
#     - Raw connection string:
#         Host=nopcommerce_database;Port=5432;Database=nopcommerce;Username=nop;Password=YOUR_PASSWORD;
#     - TICK "Create database if it doesn't exist"   (REQUIRED, see note below)
#     - TICK "Create sample data" for demo data
#
# Option B — AUTOMATED headless install (the nopcommerce_installer sidecar):
#   Set these env vars in the Coolify UI, then deploy:
#     NOP_AUTO_INSTALL=true
#     NOP_ADMIN_EMAIL=admin@yourstore.com
#     NOP_ADMIN_PASSWORD=Your_Strong_Pw1
#     NOP_SAMPLE_DATA=true            # demo data
#   The sidecar waits for the web app, then POSTs to /install with a fresh
#   antiforgery token. It is idempotent: if the store is already installed it
#   exits immediately. Do NOT also run the manual wizard.
#
# ── IMPORTANT: why POSTGRES_DB is not set ───────────────────────────────────
#   nopCommerce only creates the required PostgreSQL extensions (citext,
#   pgcrypto) when it creates the database itself. If Postgres pre-creates the
#   "nopcommerce" database, nopCommerce skips that step and the migration fails
#   with: type "citext" does not exist. So we let nopCommerce create the
#   database ("Create database if it doesn't exist" / CreateDatabaseIfNotExists).
#   The postgres image will create a throwaway default DB named "nop" (= the
#   user); it is unused and harmless.
#
# Note: the named volumes below are auto-seeded by Docker from the image on first
# creation, so the installer's bundled App_Data files are preserved while your
# install config + DataProtection keys persist across redeploys.

services:
    nopcommerce_web:
        build: .
        restart: unless-stopped
        expose:
            - "80"                     # Coolify's proxy routes here; do NOT publish to host
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
        volumes:
            - nop_app_data:/app/App_Data         # install config (appsettings.json) + DataProtection keys
            - nop_images:/app/wwwroot/images     # uploaded product images
            - nop_plugins:/app/Plugins           # installed plugins
        depends_on:
            - nopcommerce_database

    nopcommerce_database:
        image: "postgres:16-alpine"
        restart: unless-stopped
        environment:
            # Do NOT set POSTGRES_DB. Let nopCommerce create the "nopcommerce"
            # database so it also creates the citext/pgcrypto extensions.
            POSTGRES_USER: "nop"
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # set this in the Coolify UI
        volumes:
            - nop_pgdata:/var/lib/postgresql/data

    # One-shot automated installer. No-op unless NOP_AUTO_INSTALL=true.
    nopcommerce_installer:
        image: "curlimages/curl:8.10.1"
        restart: "no"
        depends_on:
            - nopcommerce_web
        environment:
            NOP_AUTO_INSTALL: ${NOP_AUTO_INSTALL:-false}
            NOP_URL: ${NOP_URL:-http://nopcommerce_web:80}
            NOP_ADMIN_EMAIL: ${NOP_ADMIN_EMAIL:-admin@yourstore.com}
            NOP_ADMIN_PASSWORD: ${NOP_ADMIN_PASSWORD:-}
            NOP_SAMPLE_DATA: ${NOP_SAMPLE_DATA:-true}
            # Connection string used by the installer. Defaults to the in-stack
            # Postgres; override NOP_CONNECTION_STRING if you use an external DB.
            NOP_CONNECTION_STRING: ${NOP_CONNECTION_STRING:-Host=nopcommerce_database;Port=5432;Database=nopcommerce;Username=nop;Password=${POSTGRES_PASSWORD};}
        # Script is inlined (not bind-mounted) so it does not depend on the repo
        # files being present in the container at runtime. $$ escapes Compose
        # interpolation so the shell receives a literal $.
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                set -eu

                if [ "$${NOP_AUTO_INSTALL:-false}" != "true" ]; then
                    echo "[installer] NOP_AUTO_INSTALL != true -> skipping automated install."
                    exit 0
                fi
                if [ -z "$${NOP_ADMIN_PASSWORD:-}" ]; then
                    echo "[installer] ERROR: NOP_ADMIN_PASSWORD is required when NOP_AUTO_INSTALL=true." >&2
                    exit 1
                fi

                BASE="$${NOP_URL:-http://nopcommerce_web:80}"
                BASE="$${BASE%/}"
                JAR="$$(mktemp)"
                RESP="$$(mktemp)"

                echo "[installer] Waiting for web app at $${BASE} ..."
                i=0
                until curl -s -o /dev/null "$${BASE}/install"; do
                    i=$$((i + 1))
                    if [ "$$i" -gt 120 ]; then
                        echo "[installer] ERROR: web app did not respond in time." >&2
                        exit 1
                    fi
                    sleep 3
                done

                CODE="$$(curl -s -o /dev/null -w '%{http_code}' "$${BASE}/install")"
                if [ "$$CODE" != "200" ]; then
                    echo "[installer] /install returned HTTP $${CODE} -> already installed. Nothing to do."
                    exit 0
                fi

                echo "[installer] Fetching antiforgery token ..."
                HTML="$$(curl -s -c "$${JAR}" "$${BASE}/install")"
                TOKEN="$$(printf '%s' "$$HTML" | tr '>' '\n' \
                    | grep '__RequestVerificationToken' \
                    | sed -n 's/.*value="\([^"]*\)".*/\1/p' | head -n1)"
                if [ -z "$${TOKEN}" ]; then
                    echo "[installer] ERROR: could not extract antiforgery token." >&2
                    exit 1
                fi

                echo "[installer] Submitting installation (sample data=$${NOP_SAMPLE_DATA:-true}) ..."
                STATUS="$$(curl -s -b "$${JAR}" -c "$${JAR}" -o "$${RESP}" -w '%{http_code}' -m 1800 \
                    --data-urlencode "__RequestVerificationToken=$${TOKEN}" \
                    --data-urlencode "AdminEmail=$${NOP_ADMIN_EMAIL:-admin@yourstore.com}" \
                    --data-urlencode "AdminPassword=$${NOP_ADMIN_PASSWORD}" \
                    --data-urlencode "ConfirmPassword=$${NOP_ADMIN_PASSWORD}" \
                    --data-urlencode "DataProvider=PostgreSQL" \
                    --data-urlencode "ConnectionStringRaw=true" \
                    --data-urlencode "ConnectionString=$${NOP_CONNECTION_STRING}" \
                    --data-urlencode "CreateDatabaseIfNotExists=true" \
                    --data-urlencode "InstallSampleData=$${NOP_SAMPLE_DATA:-true}" \
                    --data-urlencode "SubscribeNewsletters=false" \
                    "$${BASE}/install")"

                if grep -q "window.location.replace" "$${RESP}"; then
                    echo "[installer] Installation succeeded. Restarting app ..."
                    curl -s -o /dev/null -m 30 "$${BASE}/install/restartapplication" || true
                    echo "[installer] Done."
                    exit 0
                fi

                echo "[installer] ERROR: installation failed (HTTP $${STATUS}). Response excerpt:" >&2
                sed -n '1,60p' "$${RESP}" >&2
                exit 1

volumes:
    nop_app_data:
    nop_images:
    nop_plugins:
    nop_pgdata:
